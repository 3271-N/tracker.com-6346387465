```html
<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Zenith Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs/loader.min.js"></script>
    <style>
        body { background: #0f172a; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
    </style>
</head>
<body>

    <nav class="h-12 bg-slate-900 border-b border-slate-800 flex items-center justify-between px-4 text-xs font-bold text-slate-400">
        <div class="flex gap-4 uppercase tracking-widest">
            <span>Zenith Studio</span>
        </div>
        <div class="flex gap-4">
            <button onclick="exportCode()" class="hover:text-blue-400 cursor-pointer">İNDİR</button>
            <button onclick="clearEditor()" class="hover:text-red-400 cursor-pointer">SİFİR-LA</button>
        </div>
    </nav>

    <main class="flex flex-grow w-full overflow-hidden">
        <div id="editor" class="w-1/2 h-full"></div>
        <iframe id="preview" class="w-1/2 h-full border-none bg-white"></iframe>
    </main>

    <script>
        require.config({ paths: { 'vs': 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs' }});
        
        require(['vs/editor/editor.main'], function() {
            window.editor = monaco.editor.create(document.getElementById('editor'), {
                value: "<!-- Yeni Başlangıç -->\n<h1>Zenith</h1>",
                language: 'html',
                theme: 'vs-dark',
                fontSize: 13,
                automaticLayout: true
            });

            window.editor.onDidChangeModelContent(() => {
                const code = window.editor.getValue();
                const blob = new Blob([code], { type: 'text/html' });
                document.getElementById('preview').src = URL.createObjectURL(blob);
            });
        });

        function clearEditor() {
            window.editor.setValue("");
        }

        function exportCode() {
            const blob = new Blob([window.editor.getValue()], { type: 'text/html' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = 'proje.html';
            a.click();
        }
    </script>
</body>
</html>
