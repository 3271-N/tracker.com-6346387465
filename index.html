<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>PORTFOLYA. | Canlı Editör</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs/loader.min.js"></script>
    <style>
        body { background: #0b0e14; color: white; margin: 0; min-height: 100vh; }
        .editor-header { background: #111827; border: 1px solid #1f2937; border-top-left-radius: 8px; border-top-right-radius: 8px; padding: 10px 16px; display: flex; align-items: center; justify-content: space-between; }
        .window-dot { width: 12px; height: 12px; border-radius: 50%; }
        
        /* Yükseklikler 400px'ten 75vh'ye (ekranın %75'i) çıkarıldı */
        #editor { height: 75vh; min-height: 600px; }
        #preview { width: 100%; height: 75vh; min-height: 600px; background: white; border: none; }
    </style>
</head>
<body>

    <!-- Üst Navigasyon -->
    <nav class="flex items-center justify-between p-6 border-b border-slate-800 bg-[#0b0e14]">
        <div class="text-2xl font-black tracking-tighter text-blue-400">PORTFOLYA.</div>
        <div class="flex gap-4 text-xl">
            <span>🎨</span>
            <span>⚙️</span>
            <span>≡</span>
        </div>
    </nav>

    <!-- Ana Konteyner: Genişlik limiti max-w-6xl yerine max-w-[95%] yapılarak genişletildi -->
    <main class="max-w-[98%] mx-auto py-8 px-4">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold mb-2">Canlı Kod Editörü</h1>
            <p class="text-slate-400">HTML ve CSS kodlarınızı sol tarafa yazın, çıktısını sağ taraftaki köşede anında izleyin.</p>
        </div>

        <div class="grid md:grid-cols-2 gap-6">
            <!-- Sol: Kod Editörü -->
            <div class="flex flex-col">
                <div class="editor-header">
                    <div class="flex items-center gap-2">
                        <span class="text-slate-400">> index.html</span>
                    </div>
                    <div class="flex gap-2">
                        <div class="window-dot bg-red-500"></div>
                        <div class="window-dot bg-yellow-500"></div>
                        <div class="window-dot bg-green-500"></div>
                    </div>
                </div>
                <div id="editor" class="border-x border-b border-slate-800 rounded-b-lg overflow-hidden w-full"></div>
            </div>

            <!-- Sağ: Canlı Önizleme -->
            <div class="flex flex-col">
                <div class="editor-header bg-slate-900">
                    <span class="text-slate-300 text-sm">◎ CANLI ÖNİZLEME KÖŞESİ</span>
                </div>
                <iframe id="preview" class="border-x border-b border-slate-800 rounded-b-lg w-full"></iframe>
            </div>
        </div>
    </main>

    <script>
        require.config({ paths: { 'vs': 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs' }});
        
        require(['vs/editor/editor.main'], function() {
            window.editor = monaco.editor.create(document.getElementById('editor'), {
                value: "<h1>🚀 Sistem Hazır!</h1>\n<p>Sol taraftaki kutuya HTML yazarak burayı değiştirebilirsin.</p>\n\n<style>\n  h1 {\n    color: #3b82f6;\n    font-family: sans-serif;\n  }\n  p {\n    font-family: sans-serif;\n    font-size: 18px;\n  }\n</style>",
                language: 'html',
                theme: 'vs-dark',
                automaticLayout: true
            });

            const update = () => {
                const blob = new Blob([window.editor.getValue()], { type: 'text/html' });
                document.getElementById('preview').src = URL.createObjectURL(blob);
            };
            window.editor.onDidChangeModelContent(update);
            update();
        });
    </script>
</body>
</html>
